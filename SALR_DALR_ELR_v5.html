
<style>
* { box-sizing: border-box; }
.wrap { padding: 1rem 0; font-family: var(--font-sans); }
.top-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.cc { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 13px; }
.cl { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 4px; }
.cr { display: flex; align-items: center; gap: 8px; }
.cr input[type=range] { flex: 1; }
.cv { font-size: 12px; font-weight: 500; min-width: 56px; text-align: right; color: var(--color-text-primary); }
.main { display: grid; grid-template-columns: 1fr 200px; gap: 14px; align-items: start; }
.chart-area { position: relative; height: 400px; }
.side { display: flex; flex-direction: column; gap: 8px; }
.sc { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 9px 11px; }
.sl { font-size: 10px; color: var(--color-text-secondary); margin-bottom: 2px; }
.sv { font-size: 12px; font-weight: 500; color: var(--color-text-primary); }
.sky-box { border-radius: var(--border-radius-md); overflow: hidden; background: var(--color-background-secondary); }
.btn-row { display: flex; gap: 8px; margin-top: 8px; }
.btn-row button { flex: 1; font-size: 12px; padding: 6px 4px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-primary); cursor: pointer; }
.legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; font-size: 11px; color: var(--color-text-secondary); }
.li { display: flex; align-items: center; gap: 4px; }
.warn { font-size: 10px; color: var(--color-text-warning, #EF9F27); margin-top: 3px; min-height: 14px; }
</style>

<div class="wrap">
<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden">Explorateur DALR SALR ELR avec simulation physique de bulle convective</h2>

<div class="top-grid">
  <div class="cc">
    <div class="cl">ELR (°C/1000 ft)</div>
    <div class="cr"><input type="range" id="elr" min="0.5" max="5" step="0.1" value="2.5"><span class="cv" id="ev">2.5</span></div>
  </div>
  <div class="cc">
    <div class="cl">Température au sol (°C)</div>
    <div class="cr"><input type="range" id="t0" min="-10" max="40" step="1" value="20"><span class="cv" id="tv">20°C</span></div>
    <div class="warn" id="t0-warn"></div>
  </div>
  <div class="cc">
    <div class="cl">Point de rosée au sol (°C)</div>
    <div class="cr"><input type="range" id="dp" min="-20" max="40" step="1" value="10"><span class="cv" id="dv">10°C</span></div>
    <div class="warn" id="dp-warn"></div>
  </div>
</div>

<div class="legend">
  <div class="li"><span style="display:inline-block;width:16px;height:2px;background:#378add"></span>ELR</div>
  <div class="li"><span style="display:inline-block;width:16px;height:2px;border-top:2px dashed #E24B4A"></span>DALR 3°C/1000ft</div>
  <div class="li"><span style="display:inline-block;width:16px;height:2px;border-top:2px dashed #1D9E75"></span>SALR 1.8°C/1000ft</div>
  <div class="li"><span style="display:inline-block;width:16px;height:2px;border-top:2px dashed #F0992B"></span>Trajectoire bulle</div>
</div>

<div class="main">
  <div>
    <div class="chart-area"><canvas id="skewt" role="img" aria-label="Diagramme température altitude DALR SALR ELR bulle"></canvas></div>
    <div class="btn-row">
      <button id="btn-play" onclick="startAnim()">▶ Lancer</button>
      <button onclick="resetAll()">↺ Reset</button>
    </div>
  </div>
  <div class="side">
    <div class="sky-box"><canvas id="sky" width="200" height="240"></canvas></div>
    <div class="sc"><div class="sl">Altitude</div><div class="sv" id="sa">0 ft</div></div>
    <div class="sc"><div class="sl">ΔT (bulle − env.)</div><div class="sv" id="sd">—</div></div>
    <div class="sc"><div class="sl">État</div><div class="sv" id="ss">En attente</div></div>
    <div class="sc"><div class="sl">Stabilité</div><div class="sv" id="sstab">—</div></div>
  </div>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-annotation/3.0.1/chartjs-plugin-annotation.min.js"></script>
<script>
const DALR = 3.0, SALR = 1.8, MAXALT = 18000, EPS = 0.08;
const FPS_INTERVAL = 50;
const ACCEL_SCALE  = 3.5;
const DAMPING      = 0.992;
const INIT_VEL     = 40; // ft/frame fixe, petite impulsion thermique neutre

let chart = null, rafId = null, running = false;
let bubAlt = 0, bubVel = 0;

function p(id) { return parseFloat(document.getElementById(id).value); }

// Point de rosée effectif : toujours <= t0
function dpEff() { return Math.min(p('dp'), p('t0')); }

function lcl() {
  const spread = p('t0') - dpEff();
  return spread <= 0 ? 0 : (spread / 2.5) * 1000;
}
function tEnv(alt) { return p('t0') - p('elr') * alt / 1000; }
function tBub(alt) {
  const lc = lcl();
  if (alt <= lc) return p('t0') - DALR * alt / 1000;
  return (p('t0') - DALR * lc / 1000) - SALR * (alt - lc) / 1000;
}
function dT(alt) { return tBub(alt) - tEnv(alt); }

function enforceDP() {
  const t0 = p('t0'), dp = p('dp');
  const dpEl = document.getElementById('dp');
  const warnEl = document.getElementById('dp-warn');
  if (dp > t0) {
    dpEl.value = t0;
    document.getElementById('dv').textContent = t0 + '°C';
    warnEl.textContent = 'Limité à T° sol (' + t0 + '°C)';
  } else {
    warnEl.textContent = '';
  }
}

function stabLabel(elr) {
  if (Math.abs(elr - DALR) < EPS) return { t:'Neutre (sec)',      c:'#888780' };
  if (Math.abs(elr - SALR) < EPS) return { t:'Neutre (saturé)',   c:'#888780' };
  if (elr > DALR) return { t:'Absolument instable',               c:'#E24B4A' };
  if (elr < SALR) return { t:'Absolument stable',                 c:'#378add' };
  return              { t:'Cond. instable',                       c:'#EF9F27' };
}

function buildChart() {
  enforceDP();
  const elr = p('elr'), t0 = p('t0');
  const lc = lcl();
  const alts = []; for (let a = 0; a <= MAXALT; a += 400) alts.push(a);

  const elrD  = alts.map(a => ({ x: t0 - elr*a/1000,  y: a }));
  const dalrD = alts.map(a => ({ x: t0 - DALR*a/1000, y: a }));
  const salrD = alts.map(a => ({ x: t0 - SALR*a/1000, y: a }));
  const bubD  = alts.map(a => ({ x: tBub(a),           y: a }));

  const allX = [...elrD, ...dalrD].map(d => d.x);
  const xMin = Math.min(...allX) - 3, xMax = t0 + 5;

  const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
  const gc = isDark ? 'rgba(255,255,255,.07)' : 'rgba(0,0,0,.06)';
  const tc = isDark ? '#9c9a92' : '#888780';

  const stab = stabLabel(elr);
  const zc = { '#E24B4A':'rgba(226,75,74,.07)', '#378add':'rgba(55,138,221,.08)', '#EF9F27':'rgba(240,153,43,.07)', '#888780':'rgba(136,135,128,.07)' };

  const anns = {
    zone: { type:'box', xMin, xMax, yMin:0, yMax:MAXALT, backgroundColor: zc[stab.c]||'transparent', borderWidth:0, drawTime:'beforeDatasetsDraw' }
  };
  if (lc > 0 && lc < MAXALT) {
    anns.lcl = { type:'line', yMin:lc, yMax:lc, borderColor:'#F0992B', borderWidth:1, borderDash:[4,4],
      label:{ content:'LCL ~'+Math.round(lc/100)*100+' ft', display:true, position:'end', font:{size:10}, color:'#F0992B', backgroundColor:'transparent', padding:2 } };
  }

  const datasets = [
    { label:'ELR',  data:elrD,  borderColor:'#378add', pointRadius:0, borderWidth:2.5, fill:false, tension:0, parsing:{xAxisKey:'x',yAxisKey:'y'} },
    { label:'DALR', data:dalrD, borderColor:'#E24B4A', pointRadius:0, borderWidth:2, borderDash:[6,3], fill:false, tension:0, parsing:{xAxisKey:'x',yAxisKey:'y'} },
    { label:'SALR', data:salrD, borderColor:'#1D9E75', pointRadius:0, borderWidth:2, borderDash:[4,4], fill:false, tension:0, parsing:{xAxisKey:'x',yAxisKey:'y'} },
    { label:'Bulle',data:bubD,  borderColor:'#F0992B', pointRadius:0, borderWidth:1.5, borderDash:[3,3], fill:false, tension:0, parsing:{xAxisKey:'x',yAxisKey:'y'} },
  ];

  if (chart) {
    chart.data.datasets = datasets;
    chart.options.scales.x.min = xMin; chart.options.scales.x.max = xMax;
    chart.options.plugins.annotation.annotations = anns;
    chart.update('none');
  } else {
    chart = new Chart(document.getElementById('skewt'), {
      type:'line', data:{ datasets },
      options:{ responsive:true, maintainAspectRatio:false, animation:false,
        plugins:{
          legend:{display:false},
          tooltip:{ mode:'index', intersect:false, callbacks:{ title:i=>Math.round(i[0].parsed.y).toLocaleString()+' ft', label:i=>i.dataset.label+': '+i.parsed.x.toFixed(1)+'°C' } },
          annotation:{ annotations: anns }
        },
        scales:{
          x:{ type:'linear', min:xMin, max:xMax, title:{display:true,text:'Température (°C)',color:tc,font:{size:12}}, ticks:{color:tc,font:{size:11},callback:v=>v+'°'}, grid:{color:gc} },
          y:{ type:'linear', min:0, max:MAXALT, title:{display:true,text:'Altitude (ft)',color:tc,font:{size:12}}, ticks:{color:tc,font:{size:11},stepSize:2000,callback:v=>v.toLocaleString()}, grid:{color:gc} }
        }
      }
    });
  }
  updateStabLabel();
  moveBubbleTo(bubAlt);
}

function updateStabLabel() {
  const s = stabLabel(p('elr'));
  document.getElementById('sstab').textContent = s.t;
  document.getElementById('sstab').style.color = s.c;
}

function moveBubbleTo(alt) {
  if (!chart) return;
  const dt = dT(alt);
  const col = dt > EPS ? '#E24B4A' : dt < -EPS ? '#378add' : '#888780';
  chart.options.plugins.annotation.annotations.bubDot = {
    type:'point', xValue:tBub(alt), yValue:alt,
    radius:9, backgroundColor:col, borderColor:'#fff', borderWidth:2
  };
  chart.update('none');
  document.getElementById('sa').textContent = Math.round(alt).toLocaleString() + ' ft';
  const dtEl = document.getElementById('sd');
  dtEl.textContent = (dt >= 0 ? '+' : '') + dt.toFixed(1) + ' °C';
  dtEl.style.color = col;
  drawSky(alt, dt);
}

function drawSky(alt, dt) {
  const c = document.getElementById('sky');
  const W = c.width, H = c.height;
  const ctx = c.getContext('2d');
  const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
  ctx.clearRect(0, 0, W, H);

  const skyG = ctx.createLinearGradient(0, 0, 0, H - 20);
  if (isDark) { skyG.addColorStop(0,'#0a1628'); skyG.addColorStop(1,'#1a2818'); }
  else        { skyG.addColorStop(0,'#87ceeb'); skyG.addColorStop(1,'#c8e6a0'); }
  ctx.fillStyle = skyG; ctx.fillRect(0, 0, W, H - 20);
  ctx.fillStyle = isDark ? '#2d3320' : '#7cb342';
  ctx.fillRect(0, H - 20, W, 20);

  const lc = lcl();
  if (lc > 0 && lc < MAXALT) {
    const ly = (H - 20) - (lc / MAXALT) * (H - 20);
    ctx.strokeStyle = '#F0992B'; ctx.lineWidth = 1; ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(0, ly); ctx.lineTo(W, ly); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#F0992B'; ctx.font = '9px sans-serif';
    ctx.fillText('LCL', 3, ly - 3);
  }

  const bubY = (H - 20) - (alt / MAXALT) * (H - 20);
  const R = 16;

  if (lc > 0 && alt > lc) {
    ctx.fillStyle = isDark ? 'rgba(200,210,220,0.25)' : 'rgba(255,255,255,0.55)';
    for (let i = -1; i <= 1; i++) { ctx.beginPath(); ctx.arc(W/2 + i*10, bubY + 4, R*0.7, 0, Math.PI*2); ctx.fill(); }
    ctx.beginPath(); ctx.arc(W/2, bubY - 2, R*0.85, 0, Math.PI*2); ctx.fill();
  }

  const col = dt > EPS ? '#E24B4A' : dt < -EPS ? '#378add' : '#888780';
  ctx.beginPath(); ctx.arc(W/2, bubY, R, 0, Math.PI*2);
  ctx.globalAlpha = 0.82; ctx.fillStyle = col; ctx.fill(); ctx.globalAlpha = 1;
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();

  ctx.fillStyle = '#fff'; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText((dt >= 0 ? '+' : '') + dt.toFixed(1) + '°', W/2, bubY + 3);
  ctx.textAlign = 'left';

  if (running && Math.abs(dt) > EPS) {
    const dir = dt > 0 ? -1 : 1;
    const ay = bubY + dir * (R + 4), tip = ay + dir * 14;
    ctx.strokeStyle = col; ctx.lineWidth = 2; ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(W/2, ay); ctx.lineTo(W/2, tip); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(W/2-5, tip-dir*6); ctx.lineTo(W/2, tip); ctx.lineTo(W/2+5, tip-dir*6);
    ctx.stroke();
  }

  ctx.fillStyle = isDark ? 'rgba(255,255,255,0.5)' : 'rgba(0,0,0,0.4)';
  ctx.font = '9px sans-serif'; ctx.textAlign = 'right';
  ctx.fillText(Math.round(alt).toLocaleString() + ' ft', W - 4, bubY + 3);
  ctx.textAlign = 'left';
}

function startAnim() {
  if (running) return;
  running = true;
  bubAlt = 0;
  bubVel = INIT_VEL;
  document.getElementById('btn-play').textContent = '▶ En cours…';
  document.getElementById('ss').textContent = '↑ Ascendance thermique';
  document.getElementById('ss').style.color = '#EF9F27';
  scheduleStep();
}

function scheduleStep() { rafId = setTimeout(step, FPS_INTERVAL); }

function step() {
  if (!running) return;
  const dt = dT(bubAlt);
  bubVel += dt * ACCEL_SCALE;
  bubVel *= DAMPING;
  bubAlt += bubVel;
  if (bubAlt < 0)      { bubAlt = 0;      bubVel = 0; }
  if (bubAlt > MAXALT) { bubAlt = MAXALT; bubVel = 0; }

  moveBubbleTo(bubAlt);

  const ssEl = document.getElementById('ss');
  if (dt > EPS)       { ssEl.textContent = '↑ Monte (plus chaude)';  ssEl.style.color = '#E24B4A'; }
  else if (dt < -EPS) { ssEl.textContent = '↓ Descend (plus froide)'; ssEl.style.color = '#378add'; }
  else                { ssEl.textContent = '— Neutre / équilibre';    ssEl.style.color = '#888780'; }

  const stopped = (bubAlt <= 0 && bubVel <= 0) || bubAlt >= MAXALT || (Math.abs(bubVel) < 1.5 && Math.abs(dt) < EPS);
  if (stopped) {
    running = false;
    document.getElementById('btn-play').textContent = '▶ Lancer';
    if      (bubAlt <= 10)          { ssEl.textContent = '⬇ Retombée au sol';     ssEl.style.color = '#378add'; }
    else if (bubAlt >= MAXALT - 50) { ssEl.textContent = '⬆ Instabilité totale';  ssEl.style.color = '#E24B4A'; }
    else                            { ssEl.textContent = '⊙ Niveau d\'équilibre'; ssEl.style.color = '#888780'; }
    return;
  }
  scheduleStep();
}

function resetAll() {
  running = false; clearTimeout(rafId);
  bubAlt = 0; bubVel = 0;
  document.getElementById('btn-play').textContent = '▶ Lancer';
  document.getElementById('sa').textContent = '0 ft';
  document.getElementById('sd').textContent = '—';
  document.getElementById('ss').textContent = 'En attente'; document.getElementById('ss').style.color = 'var(--color-text-primary)';
  if (chart) { delete chart.options.plugins.annotation.annotations.bubDot; chart.update('none'); }
  drawSky(0, 0);
}

document.getElementById('t0').addEventListener('input', () => {
  document.getElementById('tv').textContent = p('t0') + '°C';
  enforceDP();
  resetAll(); buildChart();
});
document.getElementById('dp').addEventListener('input', () => {
  enforceDP();
  document.getElementById('dv').textContent = dpEff() + '°C';
  resetAll(); buildChart();
});
document.getElementById('elr').addEventListener('input', () => {
  document.getElementById('ev').textContent = p('elr').toFixed(1);
  resetAll(); buildChart();
});

buildChart();
setTimeout(() => drawSky(0, 0), 80);
</script>
